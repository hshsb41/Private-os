<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global Voice | Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="audio-dump"></div>

    <!-- Screen 1: Join -->
    <div id="join-screen" class="screen">
        <div class="join-container">
            <div class="avatar-box" onclick="document.getElementById('avatar-input').click()">
                <img id="preview" src="https://i.ibb.co/Y4KjTgvP/Picsart-26-02-07-02-21-57-621.jpg">
                <div class="cam-icon"><i class="fas fa-camera"></i></div>
                <input type="file" id="avatar-input" hidden accept="image/*">
            </div>
            <input type="text" id="username" placeholder="NAME" maxlength="12" autocomplete="off">
            <button id="join-btn">START CALL</button>
        </div>
    </div>

    <!-- Screen 2: App -->
    <div id="app-screen" class="app-container hidden">
        <header class="header">
            <div class="h-left">
                <img src="https://i.ibb.co/Y4KjTgvP/Picsart-26-02-07-02-21-57-621.jpg" class="mini-logo">
                <div class="h-info">
                    <b>GLOBAL VOICE</b>
                    <span id="timer">00:00</span>
                </div>
            </div>
            <div class="online-pill">LIVE: <span id="count">1</span></div>
        </header>

        <main class="main-body">
            <!-- Voice View -->
            <div id="voice-view" class="view-tab">
                <div id="user-grid" class="voice-grid"></div>
            </div>

            <!-- Chat View -->
            <div id="chat-view" class="view-tab hidden">
                <div id="chat-box" class="chat-list"></div>
                <form id="chat-form" class="chat-bar">
                    <label for="c-img" class="bar-icon"><i class="fas fa-image"></i></label>
                    <input type="file" id="c-img" hidden accept="image/*">
                    <input type="text" id="c-input" placeholder="Type here..." autocomplete="off">
                    <button type="submit" id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </main>

        <nav class="footer">
            <div class="nav-item active" onclick="tab('voice')"><i class="fas fa-microphone-alt"></i><span>VOICE</span></div>
            <div class="nav-item" onclick="tab('chat')"><i class="fas fa-comment-alt"></i><span>CHAT</span></div>
            <div class="divider"></div>
            <button id="mute-btn" class="ctrl-btn"><i class="fas fa-microphone"></i></button>
            <button id="leave-btn" class="ctrl-btn red"><i class="fas fa-phone-slash"></i></button>
        </nav>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
