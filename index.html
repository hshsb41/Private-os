<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global Voice | Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="audio-container"></div>

    <!-- Join Screen -->
    <div id="join-screen" class="overlay">
        <div class="join-card">
            <div class="avatar-pick" onclick="document.getElementById('avatar-input').click()">
                <img id="avatar-preview" src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG.png">
                <div class="plus-icon"><i class="fas fa-camera"></i></div>
            </div>
            <input type="file" id="avatar-input" hidden accept="image/*">
            <input type="text" id="username" placeholder="ENTER NAME" maxlength="12">
            <button id="join-btn">START CALL</button>
        </div>
    </div>

    <!-- App Screen -->
    <div id="main-app" class="app-screen hidden">
        <header class="app-header">
            <div class="h-left">
                <img src="https://i.ibb.co/Y4KjTgvP/Picsart-26-02-07-02-21-57-621.jpg" class="header-logo">
                <div class="h-info">
                    <b>GLOBAL VOICE</b>
                    <span id="call-timer">00:00</span>
                </div>
            </div>
            <div class="h-right">
                <div class="live-pill"><i class="fas fa-circle"></i> <span id="user-count">1</span></div>
            </div>
        </header>

        <main class="app-body">
            <!-- Voice View -->
            <div id="voice-section" class="tab-view">
                <div id="user-grid" class="user-grid"></div>
            </div>

            <!-- Chat View -->
            <div id="chat-section" class="tab-view hidden">
                <div id="chat-messages" class="chat-area"></div>
                <form id="chat-form" class="chat-input-bar">
                    <label for="chat-img" class="bar-icon"><i class="fas fa-image"></i></label>
                    <input type="file" id="chat-img" hidden accept="image/*">
                    <input type="text" id="chat-msg-input" placeholder="Message..." autocomplete="off">
                    <button type="submit" id="send-msg-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('voice')">
                <i class="fas fa-waveform"></i>
                <span>VOICE</span>
            </div>
            <div class="nav-item" onclick="switchTab('chat')">
                <i class="fas fa-comment-alt"></i>
                <span>CHAT</span>
            </div>
            <div class="nav-sep"></div>
            <button id="mute-btn" class="ctrl-btn"><i class="fas fa-microphone"></i></button>
            <button id="leave-btn" class="ctrl-btn red"><i class="fas fa-phone-slash"></i></button>
        </nav>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
